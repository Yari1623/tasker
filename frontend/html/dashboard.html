<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <button id="add-btn" type="button">Ajouter +</button>
      <p id="tasker">tasker</p>
      <button id="deco-btn" type="button">Déconnexion</button>
    </header>
    <main>
      <div id="all-list">
        <div class="task-list">
          <div class="list-title" id="to-do"><p>à faire</p></div>
          <hr />
          <div class="task-name">
            <p class="task">task 1</p>
            <p class="task">task 2</p>
            <p class="task">task 3</p>
            <p class="task">task 3</p>

            <p class="task">task 3</p>

            <p class="task">task 3</p>

            <p class="task">task 3</p>
          </div>
        </div>
        <div class="task-list">
          <div class="list-title" id="in-progress"><p>en cours</p></div>
          <hr />
          <div class="task-name">
            <p class="task">task 1</p>
            <p class="task">task 2</p>
            <p class="task">task 3</p>
          </div>
        </div>
        <div class="task-list">
          <div class="list-title" id="finish"><p>terminé</p></div>
          <hr />
          <div class="task-name">
            <p class="task">task 1</p>
            <p class="task">task 2</p>
            <p class="task">task 3</p>
          </div>
        </div>
      </div>
    </main>
    <footer>
      <p id="footer">FOOTER</p>
    </footer>
  </body>
</html>
